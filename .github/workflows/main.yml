name: Build Cheat DLL
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Compile Code Directly
        shell: cmd
        run: |
          cd AssaultCubeInternal
          cl.exe /LD /Fe:../ACInternal.dll /O2 /EHsc dllmain.cpp mem.cpp proc.cpp user32.lib gdi32.lib kernel32.lib OpenGL32.lib

      - name: Upload DLL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssaultCubeMod
          path: ACInternal.dll
