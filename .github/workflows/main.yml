name: Build Cheat DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86

    - name: Compile All Source Folders
      shell: cmd
      run: |
        cd "%GITHUB_WORKSPACE%"
        
        :: Gather EVERY .cpp file from the project and subfolders
        dir /s /b *.cpp > files.txt
        
        :: Compile using global include paths for headers (/I. and /IACTrampolineHook)
        cl.exe /LD /Fe:ACInternal.dll /O2 /EHsc /DUNICODE /D_UNICODE /I. /IACTrampolineHook @files.txt user32.lib gdi32.lib kernel32.lib OpenGL32.lib
        
        :: Cleanly copy the final output
        copy ACInternal.dll "%GITHUB_WORKSPACE%\ACInternal.dll"

    - name: Upload DLL Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AssaultCubeMod
        path: ACInternal.dll
