name: Build Cheat DLL
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Compile Solution File
        run: |
          msbuild AssaultCubeInternal/AssaultCubeInternal.sln /p:Configuration=Release /p:Platform=x86

      - name: Upload DLL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssaultCubeMod
          path: |
            **/Release/*.dll
            **/Win32/Release/*.dll
