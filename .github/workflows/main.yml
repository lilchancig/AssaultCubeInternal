name: Build Cheat DLL
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Recursive Compile All Sources
        shell: cmd
        run: |
          :: Locate where dllmain.cpp is hidden in the repository and jump there
          for /r %%i in (dllmain.cpp) do if exist "%%i" cd "%%~dpi"

          :: Create a text file containing every single .cpp file in this folder and its subfolders
          dir /s /b *.cpp > files.txt

          :: Read the list and compile them all together at once
          cl.exe /LD /Fe:ACInternal.dll /O2 /EHsc @files.txt user32.lib gdi32.lib kernel32.lib OpenGL32.lib
          
          :: Move the output file to the workspace root for uploading
          copy ACInternal.dll "%GITHUB_WORKSPACE%\ACInternal.dll"

      - name: Upload DLL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssaultCubeMod
          path: ACInternal.dll
