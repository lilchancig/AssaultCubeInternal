      - name: Recursive Compile All Sources
        shell: cmd
        run: |
          :: Go back to root workspace so we catch everything
          cd "%GITHUB_WORKSPACE%"
          
          :: Recursively find EVERY .cpp file in the whole project and save to files.txt
          dir /s /b *.cpp > files.txt
          
          :: Force compile with x86 architecture optimizations and all files
          cl.exe /LD /Fe:ACInternal.dll /O2 /EHsc /DUNICODE /D_UNICODE @files.txt user32.lib gdi32.lib kernel32.lib OpenGL32.lib
          
          :: Copy it cleanly to the workspace root
          copy ACInternal.dll "%GITHUB_WORKSPACE%\ACInternal.dll"
